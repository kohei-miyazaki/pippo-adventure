<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ピッポアドベンチャー2 〜びょうきモンスターずかんの巻〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --sora:#8ED1E8; --sakura:#FF8FB1; --sakura-d:#F06292;
  --cream:#FFF7E6; --himawari:#FFD166; --mint:#7FE0B6; --mint-d:#34C99A;
  --cho:#5B4636; --cho-l:#8A7461; --shiro:#FFFFFF;
  --aka:#FF6F61; --aka-d:#E04B3D; --ki:#FFC53D; --ki-d:#E0A012; --mido:#6FCF7C; --mido-d:#4CAF5E;
  --kage:0 6px 0 rgba(91,70,54,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
  background:linear-gradient(180deg,#BDE8F5 0%,#FDF3DC 60%,#FFF7E6 100%);
  color:var(--cho); display:flex; justify-content:center;
  min-height:100%; overflow-x:hidden;
}
#stage{width:100%; max-width:430px; min-height:100dvh; position:relative; display:flex; flex-direction:column;}
#app{flex:1; display:flex; flex-direction:column; padding:14px 14px 90px; animation:fadein .3s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
@keyframes pyon{0%,100%{transform:translateY(0);}40%{transform:translateY(-16px);}60%{transform:translateY(-8px);}}
@keyframes yura{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
@keyframes puru{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
@keyframes kira{0%{opacity:0; transform:scale(.3);}50%{opacity:1; transform:scale(1.2);}100%{opacity:0; transform:scale(.6) translateY(-30px);}}
@keyframes fuwa{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes popin{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
@media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important;}}
h1,h2,h3{font-weight:900;}
.center{text-align:center;}

.btn{display:block; width:100%; border:none; cursor:pointer; font-family:inherit; font-weight:900; font-size:18px; color:#fff;
  background:var(--sakura); border-radius:28px; padding:16px; box-shadow:0 5px 0 var(--sakura-d); transition:transform .08s; margin-top:12px;}
.btn:active{transform:translateY(4px); box-shadow:0 1px 0 var(--sakura-d);}
.btn.blue{background:var(--sora); box-shadow:0 5px 0 #5BAECB;} .btn.blue:active{box-shadow:0 1px 0 #5BAECB;}
.btn.mint{background:var(--mint); box-shadow:0 5px 0 var(--mint-d);} .btn.mint:active{box-shadow:0 1px 0 var(--mint-d);}
.btn.yellow{background:var(--himawari); color:var(--cho); box-shadow:0 5px 0 #E0AC2E;} .btn.yellow:active{box-shadow:0 1px 0 #E0AC2E;}
.btn.ghost{background:#fff; color:var(--cho-l); box-shadow:0 4px 0 #E8DCC8; font-weight:700;}
.card{background:#fff; border-radius:22px; padding:18px; box-shadow:var(--kage); margin-top:12px;}
.tag{display:inline-block; background:var(--himawari); color:var(--cho); font-size:12px; font-weight:900; border-radius:99px; padding:3px 12px;}
.agetag{display:inline-block; background:#EAF6FB; color:#3D7E99; font-size:11px; font-weight:900; border-radius:99px; padding:2px 10px; border:2px solid #BDE3F0;}

.topbar{display:flex; align-items:center; gap:10px; background:#fff; border-radius:18px; padding:10px 14px; box-shadow:var(--kage);}
.topbar .face{width:46px; height:48px; flex:none;}
.topbar .info{flex:1; min-width:0;}
.topbar .nm{font-weight:900; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.topbar .lv{font-size:11px; color:var(--cho-l); font-weight:700;}
.expbar{height:10px; background:#F2E7D5; border-radius:99px; overflow:hidden; margin-top:3px;}
.expbar > div{height:100%; background:linear-gradient(90deg,var(--himawari),var(--sakura)); border-radius:99px; transition:width .5s;}
.backbtn{border:none; background:#fff; font-family:inherit; font-weight:900; color:var(--cho-l); font-size:14px; border-radius:99px; padding:8px 16px; box-shadow:var(--kage); cursor:pointer; align-self:flex-start; margin-bottom:4px;}

.island{display:flex; align-items:center; gap:14px; background:#fff; border-radius:24px; padding:14px 16px; box-shadow:var(--kage); margin-top:14px; cursor:pointer; border:3px solid transparent; position:relative; transition:transform .1s;}
.island:active{transform:scale(.97);}
.island .ic{width:58px; height:58px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;}
.island .ttl{font-weight:900; font-size:16px;}
.island .sub{font-size:12px; color:var(--cho-l); font-weight:700; margin-top:2px;}
.island .prog{font-size:11px; font-weight:900; color:var(--mint-d); margin-top:4px;}
.kit-banner{display:flex; align-items:center; gap:12px; border-radius:24px; padding:14px 16px; margin-top:14px; color:#fff; cursor:pointer;}
.kit-banner:active{transform:scale(.97);}
.menu-row{display:flex; gap:10px; margin-top:14px;}
.menu-row .mbtn{flex:1; background:#fff; border:none; border-radius:18px; padding:12px 6px; font-family:inherit; font-weight:900; color:var(--cho); box-shadow:var(--kage); cursor:pointer; font-size:13px;}
.menu-row .mbtn span{display:block; font-size:24px; margin-bottom:4px;}
.menu-row .mbtn:active{transform:scale(.95);}

.quest{display:flex; align-items:center; gap:12px; background:#fff; border-radius:20px; padding:14px; box-shadow:var(--kage); margin-top:12px; cursor:pointer;}
.quest:active{transform:scale(.97);}
.quest .qic{width:48px; height:48px; flex:none; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px;}
.quest .qt{font-weight:900; font-size:15px;}
.quest .qs{font-size:11px; color:var(--cho-l); font-weight:700; margin-top:2px;}
.quest .stamp{margin-left:auto; flex:none; font-size:13px; font-weight:900; color:var(--mint-d);}
.stars{color:#FFB400; font-size:13px; letter-spacing:1px;}

.lesson-card{background:#fff; border-radius:26px; padding:22px 20px; box-shadow:var(--kage); margin-top:12px; min-height:300px; display:flex; flex-direction:column;}
.lesson-card h3{font-size:19px; color:var(--sakura-d); margin-bottom:12px;}
.lesson-card p{font-size:15px; line-height:1.9; font-weight:700; white-space:pre-line; flex:1;}
.lesson-card .pippo-say{display:flex; gap:10px; align-items:flex-end; margin-top:16px;}
.fukidashi{background:var(--cream); border-radius:16px; padding:10px 14px; font-size:13px; font-weight:700; line-height:1.7; position:relative; flex:1;}
.dots{display:flex; justify-content:center; gap:8px; margin-top:14px;}
.dots i{width:10px; height:10px; border-radius:50%; background:#E8DCC8;}
.dots i.on{background:var(--sakura); transform:scale(1.25);}
.nav2{display:flex; gap:10px;} .nav2 .btn{flex:1;}

.battle-field{background:linear-gradient(180deg,#C9EBF7,#FDF3DC); border-radius:26px; padding:18px 14px 14px; box-shadow:var(--kage); margin-top:10px;}
.enemy-zone{text-align:center; position:relative;}
.monster-av{width:104px; height:104px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:56px; border:4px solid rgba(91,70,54,.18); box-shadow:0 5px 0 rgba(91,70,54,.12); animation:yura 2.5s infinite;}
.enemy-zone.hit .monster-av{animation:puru .35s;}
.hpwrap{max-width:230px; margin:8px auto 0;}
.hpname{font-size:12px; font-weight:900;}
.hpbar{height:12px; background:#fff; border-radius:99px; overflow:hidden; border:2px solid #D9C9B3;}
.hpbar > div{height:100%; background:linear-gradient(90deg,#B39DDB,#7E57C2); transition:width .4s; border-radius:99px;}
.vs-pippo{text-align:center; margin-top:6px;}
.vs-pippo .pp{width:88px; display:inline-block;}
.vs-pippo.attack .pp{animation:pyon .5s;}
.qbox{background:#fff; border-radius:18px; padding:14px; margin-top:10px; font-weight:900; font-size:15px; line-height:1.8;}
.qbox .case-tag{display:inline-block; background:var(--sora); color:#fff; font-size:11px; border-radius:99px; padding:2px 10px; margin-bottom:6px;}
.choice{display:block; width:100%; text-align:left; background:#fff; border:3px solid #F0E4D0; border-radius:18px; padding:13px 14px; font-family:inherit; font-weight:700; font-size:14px; color:var(--cho); margin-top:10px; cursor:pointer; line-height:1.6;}
.choice:active{transform:scale(.98);}
.choice.ok{border-color:var(--mint-d); background:#EAFBF3;}
.choice.ng{border-color:var(--sakura-d); background:#FFEEF3;}
.choice.lt-g{border-color:var(--mido);} .choice.lt-y{border-color:var(--ki);} .choice.lt-r{border-color:var(--aka);}
.choice.lt-g.ok{background:#EDFBEF;} .choice.lt-y.ok{background:#FFF8E2;} .choice.lt-r.ok{background:#FFEFEA;}
.kaisetsu{background:#FFFBEF; border:2px dashed var(--himawari); border-radius:16px; padding:12px; font-size:13px; font-weight:700; line-height:1.8; margin-top:10px; white-space:pre-line;}
.beam{position:absolute; left:50%; bottom:-4px; font-size:30px; animation:kira .7s forwards; pointer-events:none;}

.result-pop{text-align:center; padding:10px 0;}
.result-pop .big{font-size:26px; font-weight:900; color:var(--sakura-d); animation:popin .4s;}
.bigstars{font-size:40px; color:#FFB400; margin:8px 0; letter-spacing:6px;}
.exp-get{display:inline-block; background:var(--himawari); border-radius:99px; padding:6px 18px; font-weight:900; margin-top:6px;}

/* モンスターカード */
.mcard{background:#fff; border-radius:22px; box-shadow:var(--kage); margin-top:12px; overflow:hidden; border:3px solid #F0E4D0;}
.mcard .mhead{display:flex; align-items:center; gap:12px; padding:14px 16px;}
.mcard .mav{width:62px; height:62px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:34px; border:3px solid rgba(91,70,54,.15);}
.mcard .mname{font-weight:900; font-size:17px;}
.mcard .mreal{font-size:11px; font-weight:700; color:var(--cho-l);}
.mcard .mbody{padding:0 16px 14px; font-size:13px; font-weight:700; line-height:1.8;}
.mrow{display:flex; gap:8px; margin-top:8px; align-items:flex-start;}
.mrow .ml{flex:none; background:var(--cream); border-radius:99px; padding:2px 10px; font-size:11px; font-weight:900;}
.mrow .mv{flex:1; white-space:pre-line;}

/* ずかん */
.zukan-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:12px;}
.zk{background:#fff; border-radius:16px; padding:8px 4px; text-align:center; box-shadow:var(--kage); cursor:pointer;}
.zk .za{font-size:28px;}
.zk .zn{font-size:9px; font-weight:900; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.zk.locked{opacity:.45; filter:grayscale(1);}
.zk:active{transform:scale(.93);}

/* レッドサイン */
.redsign{display:flex; gap:10px; align-items:center; background:#fff; border-radius:16px; padding:12px 14px; box-shadow:var(--kage); margin-top:10px; font-weight:900; font-size:13.5px; line-height:1.6; border-left:6px solid var(--aka);}
.redsign .ri{font-size:20px; flex:none;}
.tel-card{border-radius:20px; padding:16px; margin-top:12px; color:#fff; box-shadow:var(--kage);}
.tel-card .num{font-size:26px; font-weight:900; letter-spacing:1px;}
.tel-card a{color:#fff; text-decoration:none; display:block;}
.accordion{background:#fff; border-radius:18px; box-shadow:var(--kage); margin-top:10px; overflow:hidden;}
.accordion .acc-h{padding:14px; font-weight:900; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:8px;}
.accordion .acc-b{display:none; padding:0 16px 14px; font-size:13px; font-weight:700; line-height:1.9; white-space:pre-line;}
.accordion.open .acc-b{display:block;}
.accordion .arr{margin-left:auto; transition:transform .2s;}
.accordion.open .arr{transform:rotate(90deg);}

.badge-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px;}
.badge{background:#fff; border-radius:18px; padding:12px 6px; text-align:center; box-shadow:var(--kage);}
.badge .bi{font-size:32px;}
.badge .bn{font-size:11px; font-weight:900; margin-top:4px;}
.badge.locked{opacity:.4; filter:grayscale(1);}

input.namein{width:100%; border:3px solid #F0E4D0; border-radius:18px; padding:13px; font-family:inherit; font-weight:700; font-size:16px; margin-top:10px; outline:none; color:var(--cho);}
input.namein:focus{border-color:var(--sora);}

.title-wrap{flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; padding-bottom:30px;}
.logo-sub{font-size:13px; font-weight:900; color:var(--cho-l); letter-spacing:2px;}
.logo-main{font-size:33px; font-weight:900; color:var(--sakura-d); text-shadow:3px 3px 0 #fff; line-height:1.3; margin:6px 0;}
.title-pippo{width:175px; margin:10px auto; animation:fuwa 2.6s infinite;}
.clouds{position:absolute; top:18px; width:100%; left:0; display:flex; justify-content:space-around; font-size:34px; opacity:.8; pointer-events:none;}
.clouds span{animation:fuwa 4s infinite;}
.clouds span:nth-child(2){animation-delay:1.3s;}
.clouds span:nth-child(3){animation-delay:2.2s;}
.line-note{font-size:11px; color:var(--cho-l); font-weight:700; margin-top:14px; line-height:1.7;}

#toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--cho); color:#fff; font-weight:900; font-size:13px; padding:10px 20px; border-radius:99px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:99; max-width:90%; text-align:center;}
#toast.show{opacity:1;}
.confetti{position:fixed; top:-10px; font-size:20px; animation:cfall 2.4s linear forwards; pointer-events:none; z-index:98;}
@keyframes cfall{to{transform:translateY(110vh) rotate(540deg);}}
.notice{font-size:12px; color:var(--cho-l); font-weight:700; line-height:1.8; background:#FFFDF6; border-radius:14px; padding:10px 12px; margin-top:12px; border:2px dashed #EAD9BC;}
.light-legend{display:flex; gap:6px; margin-top:10px;}
.light-legend div{flex:1; border-radius:14px; padding:8px 4px; text-align:center; font-size:10.5px; font-weight:900; color:#fff; line-height:1.5;}
</style>
</head>
<body>
<div id="stage">
  <div class="clouds" aria-hidden="true"><span>☁️</span><span>☁️</span><span>☁️</span></div>
  <div id="app" role="main"></div>
</div>
<div id="toast" role="status"></div>

/* ---------- 称号 ---------- */
const TITLES=['けんしゅう中ひよこ','ひよっこドクター','たのもしい見守り隊','症状よみの達人','スーパーホームドクター','でんせつのピッポドクター'];

/* ---------- 状態 ---------- */
let S={started:false,name:'',baby:'',exp:0,done:{},stars:{},caught:{},redRead:false,ageRead:false};
let mem={};
const SAVEKEY='pippo2-save-v1';
async function save(){
  const data=JSON.stringify(S);
  try{ localStorage.setItem(SAVEKEY, data); return; }catch(e){}
  try{ if(window.storage){ await window.storage.set(SAVEKEY, data); return; } }catch(e){}
  mem[SAVEKEY]=data;
}
async function load(){
  try{ const v=localStorage.getItem(SAVEKEY); if(v){ S=Object.assign(S,JSON.parse(v)); return true; } }catch(e){}
  try{ if(window.storage){ const r=await window.storage.get(SAVEKEY); if(r&&r.value){ S=Object.assign(S,JSON.parse(r.value)); return true; } } }catch(e){}
  if(mem[SAVEKEY]){ S=Object.assign(S,JSON.parse(mem[SAVEKEY])); return true; }
  return false;
}

/* ---------- ユーティリティ ---------- */
const app=document.getElementById('app');
function lvOf(exp){ return Math.min(99, Math.floor(exp/60)+1); }
function titleOf(lv){ return TITLES[Math.min(TITLES.length-1, Math.floor((lv-1)/2))]; }
function expInLv(exp){ return exp%60; }
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2200); }
function confetti(){ const em=['🎉','✨','🌸','⭐','💛','🩺']; for(let i=0;i<18;i++){ const d=document.createElement('div'); d.className='confetti'; d.textContent=em[i%em.length]; d.style.left=(Math.random()*100)+'%'; d.style.animationDelay=(Math.random()*.6)+'s'; document.body.appendChild(d); setTimeout(()=>d.remove(),3000);} }
function doneCount(ci){ return CH[ci].quests.filter(q=>S.done[CH[ci].id+'/'+q.id]).length; }
function totalDone(){ return Object.keys(S.done).length; }
function totalQuests(){ return CH.reduce((a,c)=>a+c.quests.length,0); }
function allMon(){ const r=[]; CH.forEach((c,ci)=>c.quests.forEach((q,qi)=>r.push({ci,qi,key:c.id+'/'+q.id,m:q.m}))); return r; }
function caughtCount(){ return allMon().filter(x=>S.caught[x.key]).length; }
function header(){
  const lv=lvOf(S.exp);
  return `<div class="topbar">
    <div class="face">${pippoSVG('nico')}</div>
    <div class="info">
      <div class="nm">${esc(S.name||'パパママ')}さん <span class="tag">Lv.${lv}</span></div>
      <div class="lv">称号:${titleOf(lv)}　📖ずかん ${caughtCount()}/${totalQuests()}</div>
      <div class="expbar"><div style="width:${expInLv(S.exp)/60*100}%"></div></div>
    </div>
  </div>`;
}
function monsterCard(m,caught){
  return `<div class="mcard">
    <div class="mhead" style="background:${m.col};">

/* ---------- 診察バトル ---------- */
function showBattle(ci,qi,no,correct){
  const c=CH[ci], q=c.quests[qi], QZ=q.quiz, total=QZ.length;
  const enemyHP = total - correct;
  if(no>=total){ return showResult(ci,qi,correct); }
  const item=QZ[no];
  const isCase=!item.c;
  const choices=isCase?LIGHTS:item.c;
  const lightCls=['lt-g','lt-y','lt-r'];
  app.innerHTML=`${header()}
    <div class="battle-field">
      <div class="center" style="font-size:12px;font-weight:900;color:var(--cho-l);">しんさつ ${no+1} / ${total}</div>
      <div class="enemy-zone" id="ez">
        <div class="monster-av" style="background:${q.m.col};">${q.m.av}</div>
        <div class="hpwrap">
          <div class="hpname">びょうきモンスター ${esc(q.m.n)}</div>
          <div class="hpbar"><div id="hpfill" style="width:${enemyHP/total*100}%"></div></div>
        </div>
      </div>
      <div class="vs-pippo" id="vp"><div class="pp">${pippoSVG('ganba')}</div></div>
      <div class="qbox">${isCase?'<span class="case-tag">🚦 受診しんごうで答えよう</span><br>':''}${esc(item.q)}</div>
      <div id="choices">${choices.map((ch,i)=>`<button class="choice ${isCase?lightCls[i]:''}" data-i="${i}">${isCase?'':'🅰🅱🅲'[i]+' '}${esc(ch)}</button>`).join('')}</div>
      <div id="after"></div>
    </div>`;
  document.querySelectorAll('.choice').forEach(btn=>{
    btn.onclick=()=>{
      const pick=+btn.dataset.i, ok=pick===item.a;
      document.querySelectorAll('.choice').forEach(b=>{ b.disabled=true; b.style.pointerEvents='none';
        if(+b.dataset.i===item.a) b.classList.add('ok'); else if(+b.dataset.i===pick) b.classList.add('ng'); });
      const ez=document.getElementById('ez'), vp=document.getElementById('vp');
      if(ok){
        vp.classList.add('attack'); ez.classList.add('hit');
        const beam=document.createElement('div'); beam.className='beam'; beam.textContent='🩺✨'; vp.appendChild(beam);
        const newHP=total-(correct+1);
        document.getElementById('hpfill').style.width=(newHP/total*100)+'%';
        toast('ナイス診断!モンスターのひみつが見えた!');
      } else {
        toast('だいじょうぶ、ここで覚えれば本番で勝てるピポ!');
      }
      document.getElementById('after').innerHTML=`
        <div class="kaisetsu">${ok?'🎯 ナイス判断!':'💡 こたえは「'+esc(choices[item.a])+'」'}\n${esc(item.k)}</div>
        <button class="btn ${no+1>=total?'yellow':'blue'}" id="bNext2">${no+1>=total?'しんだん結果へ!':'つぎのケースへ →'}</button>`;
      document.getElementById('bNext2').onclick=()=>showBattle(ci,qi,no+1,correct+(ok?1:0));
    };
  });
}

/* ---------- リザルト(ずかん登録) ---------- */
async function showResult(ci,qi,correct){
  const c=CH[ci], q=c.quests[qi], total=q.quiz.length, key=c.id+'/'+q.id;
  const first=!S.done[key];
  const gained = first ? 30+correct*10 : 5+correct*5;
  S.done[key]=true; S.caught[key]=true;
  S.stars[key]=Math.max(S.stars[key]||0, correct);
  const beforeLv=lvOf(S.exp); S.exp+=gained; const afterLv=lvOf(S.exp);
  await save();
  const allDone=doneCount(ci)===c.quests.length;
  confetti();
  app.innerHTML=`${header()}
    <div class="card result-pop">
      <div class="big">${first?'ずかんに とうろく!':'おさらいクリア!'}</div>
      <div style="width:110px;margin:6px auto;animation:pyon 1s;">${pippoSVG('waku')}</div>
      <div style="font-weight:900;">${esc(q.m.n)}のひみつを すべて見破った✨</div>
      <div class="bigstars">${'★'.repeat(correct)}${'☆'.repeat(total-correct)}</div>
      <div class="exp-get">+${gained} EXP</div>
      ${afterLv>beforeLv?`<div style="margin-top:10px;font-weight:900;color:var(--sakura-d);font-size:18px;animation:popin .5s;">🎺 レベルアップ! Lv.${afterLv}<br><span style="font-size:13px;">称号「${titleOf(afterLv)}」</span></div>`:''}
      ${allDone?`<div style="margin-top:10px;font-weight:900;color:var(--mint-d);">👑 ${c.name} コンプリート!</div>`:''}
    </div>
    ${monsterCard(q.m,true)}
    ${correct<total?'<button class="btn yellow" id="bRetry">もういちど挑戦して★満点をめざす</button>':''}
    <button class="btn" id="bList">クエスト一覧へ</button>
    <button class="btn ghost" id="bMap">マップへもどる</button>`;
  const br=document.getElementById('bRetry'); if(br) br.onclick=()=>showBattle(ci,qi,0,0);
  document.getElementById('bList').onclick=()=>showChapter(ci);
  document.getElementById('bMap').onclick=()=>showHome();
}

/* ---------- ずかん ---------- */
function showZukan(detailKey){
  const mons=allMon();
  if(detailKey){
    const x=mons.find(z=>z.key===detailKey);
    app.innerHTML=`${header()}
      <button class="backbtn" id="bb" style="margin-top:12px;">← ずかんへ</button>
      ${monsterCard(x.m, !!S.caught[x.key])}
      ${S.caught[x.key]?'<button class="btn mint" id="bRe">レッスン&診察をおさらいする</button>':'<button class="btn yellow" id="bRe">クエストに出発して出会う!</button>'}`;
    document.getElementById('bb').onclick=()=>showZukan();
    document.getElementById('bRe').onclick=()=>showLesson(x.ci,x.qi,0);
    return;
  }
  app.innerHTML=`${header()}
    <button class="backbtn" id="bb" style="margin-top:12px;">← マップへ</button>
    <h2 class="center">📖 びょうきモンスターずかん</h2>
    <p class="center" style="font-size:12px;font-weight:700;color:var(--cho-l);margin-top:4px;">${caughtCount()} / ${totalQuests()} 体 とうろく済み</p>
    <div class="zukan-grid">
      ${mons.map(x=>`<div class="zk${S.caught[x.key]?'':' locked'}" data-k="${x.key}">
        <div class="za">${S.caught[x.key]?x.m.av:'❓'}</div>
        <div class="zn">${S.caught[x.key]?esc(x.m.n):'？？？'}</div>
      </div>`).join('')}
    </div>
    <div class="notice">モンスターをタップすると、出やすい年齢・とくいわざ(症状)・よわてん(対処)のカードが見られるよ。全${totalQuests()}体コンプリートをめざせ!</div>`;
  document.getElementById('bb').onclick=()=>showHome();
  document.querySelectorAll('.zk').forEach(el=>el.onclick=()=>showZukan(el.dataset.k));
}

/* ---------- 救急サイン ---------- */

  if(!S.redRead){ S.redRead=true; save(); }
  app.innerHTML=`${header()}
    <button class="backbtn" id="bb" style="margin-top:12px;">← マップへ</button>
    <div class="card" style="background:linear-gradient(135deg,#FFD9CF,#FFE9D6);display:flex;gap:12px;align-items:center;">
      <div style="font-size:40px;">🚨</div>
      <div><h2 style="font-size:19px;">ピッポの救急サイン</h2><div style="font-size:12px;font-weight:700;color:var(--cho-l);">ひとつでもあれば、早めの受診・救急相談を!</div></div>
    </div>
    <div class="card center" style="background:#fff;">
      <img src="${QR_IMG}" alt="子ども救急LINE BOT QRコード" style="width:170px;height:170px;border-radius:18px;border:4px solid #F0E4D0;">
      <div style="font-weight:900;font-size:14px;margin-top:10px;">スマホのカメラで読み取ってね</div>
      <div style="font-size:12px;font-weight:700;color:var(--cho-l);line-height:1.8;margin-top:4px;">家族やお友だちに「ピッポの救急サイン」をシェア!<br>画像を長押しすると保存・共有もできます。</div>
    </div>
    ${REDSIGNS.map(r=>`<div class="redsign"><div class="ri">${r[0]}</div><div>${esc(r[1])}</div></div>`).join('')}
    <h3 style="margin-top:20px;">📞 たいせつな連絡先</h3>
    <div class="tel-card" style="background:linear-gradient(135deg,#FF8FB1,#F06292);">
      <a href="tel:%238000"><div style="font-size:13px;font-weight:900;">こども医療電話相談(夜間・休日の「どうしよう」に)</div>
      <div class="num">#8000</div><div style="font-size:11px;font-weight:700;">タップで発信 / 小児科医・看護師が相談にのってくれます</div></a>
    </div>
    <div class="tel-card" style="background:linear-gradient(135deg,#8ED1E8,#5BAECB);">
      <a href="tel:%237119"><div style="font-size:13px;font-weight:900;">救急車をよぶか迷ったら(対応地域)</div>
      <div class="num">#7119</div><div style="font-size:11px;font-weight:700;">タップで発信 / 救急安心センター</div></a>
    </div>
    <div class="tel-card" style="background:linear-gradient(135deg,#FFB199,#FF6F61);">
      <a href="tel:119"><div style="font-size:13px;font-weight:900;">意識がない・けいれんが続く・呼吸がおかしい</div>
      <div class="num">119</div><div style="font-size:11px;font-weight:700;">ためらわず救急車を!</div></a>
    </div>
    <div class="notice">💬 子ども救急LINE BOTのトークでは、症状べつの受診めやすチャットも使えます。第1章「ピッポくんの救急箱」もあわせてチェック!</div>
    <button class="btn" id="bHome2">マップへもどる</button>`;
  document.getElementById('bb').onclick=()=>showHome();
  document.getElementById('bHome2').onclick=()=>showHome();
}

/* ---------- 年齢別ガイド ---------- */
function showAgeGuide(){
  if(!S.ageRead){ S.ageRead=true; save(); }
  app.innerHTML=`${header()}
    <button class="backbtn" id="bb" style="margin-top:12px;">← マップへ</button>
    <div class="card" style="background:linear-gradient(135deg,#D7F2FF,#E2F6E9);display:flex;gap:12px;align-items:center;">
      <div style="font-size:40px;">🗓️</div>
      <div><h2 style="font-size:19px;">ねんれい別ガイド</h2><div style="font-size:12px;font-weight:700;color:var(--cho-l);">年齢で変わる「気をつける症状」と「考える病気」</div></div>
    </div>
    <p style="font-size:12px;font-weight:700;color:var(--cho-l);line-height:1.8;margin-top:10px;">病名をぜんぶ覚える必要はありません。「この年齢で、この症状なら注意」がわかればOK。タップで開きます。</p>
    ${AGEGUIDE.map((g,i)=>`<div class="accordion" id="ag${i}">
      <div class="acc-h">${g[0]}<span class="arr">▶</span></div>
      <div class="acc-b">${esc(g[1])}</div></div>`).join('')}
    <button class="btn" id="bHome2">マップへもどる</button>`;
  document.getElementById('bb').onclick=()=>showHome();
  document.getElementById('bHome2').onclick=()=>showHome();
  document.querySelectorAll('.accordion .acc-h').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));
}

/* ---------- バッジ ---------- */
function showBadges(){
  const lv=lvOf(S.exp);
  const list=[
    {i:'🩺',n:'はじめての診察',ok:totalDone()>=1,d:'はじめてのクエストをクリア'},
    ...CH.map((c,ci)=>({i:c.emoji+'👑',n:c.name+'の主治医',ok:doneCount(ci)===c.quests.length,d:c.name+'を全クリア'})),
    {i:'🚨',n:'救急サインマスター',ok:!!S.redRead,d:'ピッポの救急サインを見た'},
    {i:'🗓️',n:'年齢ガイドの賢者',ok:!!S.ageRead,d:'ねんれい別ガイドを見た'},
    {i:'🌟',n:'★パーフェクト診断',ok:Object.entries(S.stars).some(([k,v])=>{const[cid,qid]=k.split('/');const ch=CH.find(x=>x.id===cid);const qq=ch&&ch.quests.find(x=>x.id===qid);return qq&&v===qq.quiz.length;}),d:'どれかのクエストで全問正解'},
    {i:'📖',n:'ずかんコンプリート',ok:caughtCount()===totalQuests(),d:'モンスター全'+totalQuests()+'体とうろく'},
    {i:'💪',n:'Lv.10とっぱ',ok:lv>=10,d:'レベル10に到達'}
  ];
  app.innerHTML=`${header()}
    <button class="backbtn" id="bb" style="margin-top:12px;">← マップへ</button>
    <h2 class="center">🏅 バッジコレクション</h2>
    <p class="center" style="font-size:12px;font-weight:700;color:var(--cho-l);margin-top:4px;">${list.filter(b=>b.ok).length} / ${list.length} こ あつめたよ</p>
    <div class="badge-grid">
      ${list.map(b=>`<div class="badge${b.ok?'':' locked'}"><div class="bi">${b.ok?b.i:'❓'}</div><div class="bn">${b.n}</div><div style="font-size:9px;color:var(--cho-l);font-weight:700;margin-top:2px;">${b.d}</div></div>`).join('')}
    </div>`;
  document.getElementById('bb').onclick=()=>showHome();
}

/* ---------- 起動 ---------- */
async function boot(){
  const has=await load();
  showTitle(!!(has && S.started));
}
boot();
</script>
